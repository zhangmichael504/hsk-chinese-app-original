name: Build True iOS App Container

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Select Stable Xcode Environment
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Compile Package Binary
        run: |
          # Build your package target directly as a universal simulator binary executable
          xcodebuild build \
            -scheme HSKChineseApp \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=NO \
            CONFIGURATION_BUILD_DIR=${{ github.workspace }}/output-build

      - name: Manually Construct Graphical .app Bundle
        run: |
          # 1. Clear out old builds and explicitly generate a clean .app folder container
          rm -rf ${{ github.workspace }}/AppetizeBuild
          mkdir -p ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.app
          
          # 2. Copy your raw compiled binary executable straight inside and rename it to match the scheme
          cp ${{ github.workspace }}/output-build/HSKChineseApp ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.app/HSKChineseApp
          chmod +x ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.app/HSKChineseApp
          
          # 3. Inject your Info.plist properties manifest directly inside the target bundle container
          cp Sources/HSKChineseApp/Info.plist ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.app/Info.plist
          
          # 4. Generate a required boilerplate PkgInfo structural tag file so Apple's engine recognizes it as a GUI application
          echo -n "APPL????" > ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.app/PkgInfo
          
          # 5. Compress the custom structural bundle folder into the final artifact zip archive
          cd ${{ github.workspace }}/AppetizeBuild
          zip -r HSKChineseApp.zip HSKChineseApp.app

      - name: Export Zip Package as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-ios-app
          path: ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.zip
          retention-days: 5