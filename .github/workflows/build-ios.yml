name: Build iOS App for Appetize

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
          
      - name: Build for iOS Simulator
        run: |
          # 为 iOS 模拟器构建
          swift build \
            -c debug \
            --triple arm64-apple-ios-simulator \
            --product HSKChineseApp
          
      - name: Create .app Bundle Structure
        run: |
          # Swift Package Manager 构建产物位置
          BUILD_DIR=".build/arm64-apple-ios-simulator/debug"
          EXECUTABLE_PATH="$BUILD_DIR/HSKChineseApp"
          
          # 检查可执行文件是否存在
          if [ ! -f "$EXECUTABLE_PATH" ]; then
            echo "❌ 可执行文件不存在"
            echo "查找实际位置："
            find .build -name "HSKChineseApp" -type f
            exit 1
          fi
          
          echo "✅ 找到可执行文件：$EXECUTABLE_PATH"
          
          # 手动创建 .app bundle（因为 swift build 不自动创建）
          mkdir -p AppetizeBuild/HSKChineseApp.app
          
          # 复制可执行文件
          cp "$EXECUTABLE_PATH" AppetizeBuild/HSKChineseApp.app/HSKChineseApp
          chmod +x AppetizeBuild/HSKChineseApp.app/HSKChineseApp
          
          # 创建 Info.plist（必需）
          cat > AppetizeBuild/HSKChineseApp.app/Info.plist << EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleExecutable</key>
    <string>HSKChineseApp</string>
    <key>CFBundleIdentifier</key>
    <string>com.yourcompany.HSKChineseApp</string>
    <key>CFBundleName</key>
    <string>HSKChineseApp</string>
    <key>CFBundleVersion</key>
    <string>1.0</string>
    <key>CFBundleShortVersionString</key>
    <string>1.0</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
</dict>
</plist>
EOF
          
          # 创建 PkgInfo
          echo -n "APPL????" > AppetizeBuild/HSKChineseApp.app/PkgInfo
          
          # 打包
          cd AppetizeBuild
          zip -r ${{ github.workspace }}/HSKChineseApp.zip HSKChineseApp.app
          
          echo "✅ ZIP 文件创建成功"
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appetize-build
          path: HSKChineseApp.zip