name: Build iOS App Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Select Stable Xcode Environment
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build App Bundle via Xcode CLI
        run: |
          xcodebuild build \
            -scheme HSKChineseApp \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CONFIGURATION_BUILD_DIR=${{ github.workspace }}/output-build

      - name: Compress App Bundle into ZIP
        run: |
          cd ${{ github.workspace }}/output-build
          zip -r HSKChineseApp.zip *.app

      - name: Export Zip Package as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-ios-app
          path: ${{ github.workspace }}/output-build/HSKChineseApp.zip
          retention-days: 5