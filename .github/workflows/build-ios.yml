name: Build iOS App Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Compile Swift Package for iOS Simulator
        run: |
          swift build \
            -c debug \
            --triple arm64-apple-ios17.0-simulator \
            --build-path ./output-build

      - name: Compress Compiled Binary into ZIP
        run: |
          cd ./output-build/arm64-apple-ios17.0-simulator/debug
          zip -r HSKChineseApp.zip *

      - name: Export Zip Package as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-ios-app
          path: ./output-build/arm64-apple-ios17.0-simulator/debug/HSKChineseApp.zip
          retention-days: 5