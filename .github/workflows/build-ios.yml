name: Build True iOS App Container

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Select Stable Xcode Environment
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Generate Native App Scaffolding
        run: |
          # 1. Create a dummy native Xcode project directory framework
          mkdir -p HSKContainerApp
          
          # 2. Use Apple's command-line tool to generate a standard graphical app structure
          # This forces the compiler to build an interactive GUI app instead of a terminal program
          swift package generate-xcodeproj --output HSKContainerApp/
          
      - name: Compile Universal Simulator App Bundle
        run: |
          # Build using the generated project configuration targeting the simulator
          xcodebuild build \
            -project HSKContainerApp/HSKChineseApp.xcodeproj \
            -scheme HSKChineseApp \
            -sdk iphonesimulator \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=NO \
            CONFIGURATION_BUILD_DIR=${{ github.workspace }}/output-build

      - name: Package App Bundle for Web Emulators
        run: |
          # 1. Create a pristine target folder for assembly
          mkdir -p ${{ github.workspace }}/AppetizeBuild
          
          # 2. Find the true graphical .app folder generated by Xcode and copy it
          cp -R ${{ github.workspace }}/output-build/HSKChineseApp.app ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.app
          
          # 3. Inject your Info.plist properties ledger directly into the bundle
          cp Sources/HSKChineseApp/Info.plist ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.app/Info.plist
          
          # 4. Zip the entire graphical directory structure tightly
          cd ${{ github.workspace }}/AppetizeBuild
          zip -r HSKChineseApp.zip HSKChineseApp.app

      - name: Export Zip Package as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-ios-app
          path: ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.zip
          retention-days: 5