name: Build iOS App for Appetize

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout Source Codes
        uses: actions/checkout@v4
        
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
          
      - name: Generate Xcode Project
        run: |
          # 从 Package.swift 生成 Xcode 项目
          swift package generate-xcodeproj
          
      - name: Build for iOS Simulator
        run: |
          # 使用生成的 Xcode 项目构建
          xcodebuild build \
            -project HSKChineseApp.xcodeproj \
            -scheme HSKChineseApp-Package \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
          
      - name: Package .app Bundle
        run: |
          # 查找生成的 .app 文件
          APP_PATH=$(find DerivedData -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 找不到 .app 文件"
            echo "搜索整个 DerivedData:"
            find DerivedData -type d | head -20
            exit 1
          fi
          
          echo "✅ 找到 .app 文件: $APP_PATH"
          
          # 复制并打包
          mkdir -p AppetizeBuild
          cp -R "$APP_PATH" AppetizeBuild/
          cd AppetizeBuild
          zip -r ${{ github.workspace }}/HSKChineseApp.zip *.app
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appetize-build
          path: HSKChineseApp.zip