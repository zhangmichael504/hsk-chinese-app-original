name: Build iOS App Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Select Stable Xcode Environment
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build Universal App Bundle via Xcode CLI
        run: |
          xcodebuild build \
            -scheme HSKChineseApp \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=NO \
            CONFIGURATION_BUILD_DIR=${{ github.workspace }}/output-build

      - name: Structure and Compress App Bundle
        run: |
          # 1. Create a clean payload assembly folder
          mkdir -p ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.app
          
          # 2. Extract the universal simulator binary from the build outputs
          cp ${{ github.workspace }}/output-build/HSKChineseApp ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.app/HSKChineseApp
          
          # 3. Inject the Info.plist properties manifest directly inside the bundle folder
          cp Sources/HSKChineseApp/Info.plist ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.app/Info.plist
          
          # 4. Compress the verified structural app bundle into your final artifact package
          cd ${{ github.workspace }}/AppetizeBuild
          zip -r HSKChineseApp.zip HSKChineseApp.app

      - name: Export Zip Package as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-ios-app
          path: ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.zip
          retention-days: 5