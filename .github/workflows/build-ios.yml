name: Build True iOS App Container

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Select Stable Xcode Environment
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Compile Graphical Universal App Bundle
        run: |
          # Build using the Swift Package scheme natively while enforcing simulator targets
          xcodebuild build \
            -scheme HSKChineseApp \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=NO \
            DERIVED_DATA_PATH=${{ github.workspace }}/DerivedData

      - name: Package App Bundle for Web Emulators
        run: |
          # 1. Ensure our final staging folder layout exists cleanly
          mkdir -p ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.app
          
          # 2. Locate the true graphical .app package inside DerivedData using a search anchor
          REAL_APP_DIR=$(find ${{ github.workspace }}/DerivedData -name "HSKChineseApp.app" -type d | head -n 1)
          
          if [ -z "$REAL_APP_DIR" ]; then
            echo "Error: Graphical .app wrapper layer missing from build engine!"
            exit 1
          fi
          
          # 3. Copy all structural components (binary + system architectures) into our target staging zone
          cp -R "$REAL_APP_DIR/" ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.app/
          
          # 4. Enforce the Info.plist layout manifest rules precisely inside the target bundle
          cp Sources/HSKChineseApp/Info.plist ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.app/Info.plist
          
          # 5. Compress the verified, multi-architecture bundle into a zip archive
          cd ${{ github.workspace }}/AppetizeBuild
          zip -r HSKChineseApp.zip HSKChineseApp.app

      - name: Export Zip Package as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-ios-app
          path: ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.zip
          retention-days: 5