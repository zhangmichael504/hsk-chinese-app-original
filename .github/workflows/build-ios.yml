name: Build iOS App Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Select Stable Xcode Environment
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build App Bundle via Xcode CLI
        run: |
          xcodebuild build \
            -scheme HSKChineseApp \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CONFIGURATION_BUILD_DIR=${{ github.workspace }}/output-build

      - name: Locate and Compress App Bundle
        run: |
          # Dynamically look for the .app folder location
          APP_PATH=$(find ${{ github.workspace }}/output-build -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find any compiled .app bundle folder!"
            exit 1
          fi
          
          echo "Found app bundle at: $APP_PATH"
          
          # Move into the folder holding the .app bundle and zip it
          cd "$(dirname "$APP_PATH")"
          zip -r ${{ github.workspace }}/output-build/HSKChineseApp.zip "$(basename "$APP_PATH")"

      - name: Export Zip Package as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-ios-app
          path: ${{ github.workspace }}/output-build/HSKChineseApp.zip
          retention-days: 5