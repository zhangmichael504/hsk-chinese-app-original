name: Build iOS App Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Select Stable Xcode Environment
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Archive App Bundle via Xcode CLI
        run: |
          xcodebuild archive \
            -scheme HSKChineseApp \
            -destination "generic/platform=iOS Simulator" \
            -archivePath ${{ github.workspace }}/output.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            INFOPLIST_FILE=Sources/HSKChineseApp/Info.plist

      - name: Structure and Compress App Bundle
        run: |
          # 1. Create a clean payload folder layout matching what Appetize expects
          mkdir -id ${{ github.workspace }}/AppetizeBuild
          
          # 2. Extract the generated .app framework bundle out from the archive
          cp -R ${{ github.workspace }}/output.xcarchive/Products/usr/local/bin/HSKChineseApp ${{ github.workspace }}/AppetizeBuild/HSKChineseApp
          mv ${{ github.workspace }}/AppetizeBuild/HSKChineseApp ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.app
          
          # 3. Inject the Info.plist properties manifest directly inside the final target bundle
          cp Sources/HSKChineseApp/Info.plist ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.app/Info.plist
          
          # 4. Compress the verified app layer into your final archive zip file
          cd ${{ github.workspace }}/AppetizeBuild
          zip -r HSKChineseApp.zip HSKChineseApp.app

      - name: Export Zip Package as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-ios-app
          path: ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.zip
          retention-days: 5