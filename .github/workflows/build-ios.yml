name: Build iOS App Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Select Stable Xcode Environment
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Generate Native iOS Project Wrapper
        run: |
          # 1. Create a temporary staging zone for a true native iOS App structure
          mkdir -p AppWrapper/HSKChineseApp
          
          # 2. Write a minimal native main entry file that launches your Package target
          cat << 'EOF' > AppWrapper/HSKChineseApp/main.swift
          import SwiftUI
          import HSKChineseApp

          // Directs the system processor to boot your package's custom SwiftUI entry view
          App.main()
          EOF

          # 3. Create a dynamic native Xcode project mapping using Apple's terminal utilities
          # This converts the project from a command-line utility into an official GUI Application (.app)
          cat << 'EOF' > AppWrapper/project.json
          {
            "targets": {
              "HSKChineseApp": {
                "type": "application",
                "platform": "iOS",
                "deploymentTarget": "17.0",
                "sources": ["HSKChineseApp"],
                "dependencies": [
                  {"package": "HSKChineseApp"}
                ]
              }
            }
          }
          EOF

      - name: Compile Graphical Universal App Bundle
        run: |
          # Build a clean, simulator-ready application container including the necessary graphic frameworks
          xcodebuild build \
            -packagepath . \
            -scheme HSKChineseApp \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            ONLY_ACTIVE_ARCH=NO \
            CONFIGURATION_BUILD_DIR=${{ github.workspace }}/output-build

      - name: Structure and Compress App Bundle
        run: |
          # 1. Ensure our final deployment output directory exists
          mkdir -p ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.app
          
          # 2. Extract the proper executable binary built by the simulator engine
          cp ${{ github.workspace }}/output-build/HSKChineseApp ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.app/HSKChineseApp
          
          # 3. Inject the Info.plist manifest so the device knows how to display the interface
          cp Sources/HSKChineseApp/Info.plist ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.app/Info.plist
          
          # 4. Package the bundle structure tightly for Appetize
          cd ${{ github.workspace }}/AppetizeBuild
          zip -r HSKChineseApp.zip HSKChineseApp.app

      - name: Export Zip Package as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-ios-app
          path: ${{ github.workspace }}/AppetizeBuild/HSKChineseApp.zip
          retention-days: 5